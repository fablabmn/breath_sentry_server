# =================================================================
# CONFIGURAZIONE GENERALE
# =================================================================
log_dest stderr
log_type error
log_type warning
log_type notice
log_type information
log_type debug
log_type subscribe
log_type unsubscribe

# =================================================================
# LISTENER 1: IN CHIARO (Porta interna 1883) SOLO PER NODERED
# =================================================================
listener 1883 0.0.0.0
listener_allow_anonymous true

# =================================================================
# LISTENER 2: SICURO MQTTS su porta non standard, con TLS ma senza mTLS
# =================================================================
listener 5678 0.0.0.0
protocol mqtt
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
require_certificate false
# Autenticazione via username/password (obbligatoria)
allow_anonymous false
password_file /mosquitto/config/passwd

# =================================================================
# LISTENER 3: SICURO MQTTS mTLS
# =================================================================
listener 8883 0.0.0.0
listener_allow_anonymous false
# Richiede obbligatoriamente che il client presenti il suo certificato
require_certificate true
use_identity_as_username true
cafile /mosquitto/certs/ca.crt
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
